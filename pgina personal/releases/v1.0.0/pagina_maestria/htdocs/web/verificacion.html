<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de Correo - Maestría</title>
    <!-- Modern web fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated background elements -->
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    
    <!-- Main Title -->
    <h1 class="page-title">Verificación de Acceso</h1>

    <div class="two-column-layout" style="max-width: 850px; margin-top: 20px;">
        
        <!-- Left Column: Statistics -->
        <div class="container glass-panel" style="margin: 0; padding: 20px 20px;">
            <div class="header" style="margin-bottom: 15px;">
                <div class="icon-container" style="background: linear-gradient(135deg, #3b82f6, #2563eb);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
                </div>
                <h2 style="font-size: 1.4rem;">Estadísticas en Vivo</h2>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1);">
                <span style="color: #e2e8f0; font-size: 1rem; font-weight: 500;">Alumnos Prematriculados:</span>
                <span id="stat-total-alumnos" style="color: #fff; font-weight: bold; font-size: 1.5rem;">0</span>
            </div>
            
            <p style="color: #e2e8f0; margin-bottom: 15px; font-weight: 600; font-size: 0.95rem;">Ranking de cursos reservados:</p>
            <ul id="stat-lista-cursos" style="list-style: none; padding: 0; margin: 0; color: #cbd5e1; max-height: 300px; overflow-y: auto; padding-right: 5px;">
                <li style="opacity: 0.5; padding: 10px 0;">Cargando métricas...</li>
            </ul>
        </div>

        <!-- Right Column: Verification Form -->
        <div class="container glass-panel" style="margin: 0;">
            <div class="header">
                <div class="icon-container">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                </div>
                <h2>Verificación de Cuenta</h2>
                <p style="margin-top: 10px;">Ingresa tu correo electrónico para recibir tu código de acceso por email.</p>
            </div>

            <!-- Step 1: Request Code Form -->
            <form id="email-form">
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="4"></circle>
                            <path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"></path>
                        </svg>
                        <input type="email" id="email" name="email" placeholder="usuario@institucion.edu" required autocomplete="email">
                    </div>
                </div>

                <button type="submit" id="submit-btn-email">
                    <span class="btn-text">Enviar Código</span>
                    <span class="loader" style="display: none;"></span>
                </button>
            </form>

            <hr style="border: 0; height: 1px; background: rgba(255,255,255,0.1); margin: 25px 0;">
            <h3 style="color: white; margin-bottom: 10px; font-size: 1rem;">¿Ya tienes un código?</h3>
            
            <!-- Step 2: Verify Code Form -->
            <form id="code-form">
                <div class="input-group">
                    <label for="code">Ingrese el Código de Verificación</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="text" id="code" name="code" placeholder="Vacío para omitir" autocomplete="off">
                    </div>
                </div>

                <button type="submit" id="submit-btn-code">
                    <span class="btn-text">Verificar Cuenta</span>
                    <span class="loader" style="display: none;"></span>
                </button>
            </form>

            <!-- Message rendering spot -->
            <div id="message-container" class="message hidden"></div>
        </div>
    </div>

    <!-- Main Logic script -->
    <script src="verificacion.js?v=2.0"></script>
</body>
</html>
