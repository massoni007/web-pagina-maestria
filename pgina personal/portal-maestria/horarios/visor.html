<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Horario | Mecánica Estadística</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding: 2rem; }
        .visor-container { max-width: 880px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; }
        .schedule-table { width: 100%; border-collapse: collapse; text-align: center; }
        .schedule-table th, .schedule-table td { padding: 0.5rem 0.4rem; border: 1px solid rgba(255,255,255,0.08); font-size: 0.85rem; }
        .schedule-table th { background: rgba(0,0,0,0.35); font-weight: 600; color: #94a3b8; }
        .schedule-table td { background: rgba(255,255,255,0.02); height: 32px; position: relative; }
        .cell-unavail { background: rgba(239, 68, 68, 0.35) !important; cursor: help; }
        .cell-avail   { background: rgba(16, 185, 129, 0.2) !important; }
        .highlight-hour { background: rgba(59,130,246,0.08) !important; }

        /* Proposal highlighting */
        .cell-proposal { 
            background: rgba(59, 130, 246, 0.35) !important; 
            border: 2px solid rgba(59, 130, 246, 0.6) !important;
            box-shadow: inset 0 0 10px rgba(59, 130, 246, 0.2);
        }
        .cell-proposal-conflict { 
            background: rgba(245, 158, 11, 0.5) !important; 
            border: 2px solid rgba(245, 158, 11, 0.8) !important;
            box-shadow: inset 0 0 15px rgba(245, 158, 11, 0.3);
            animation: pulse-conflict 2s infinite;
            cursor: help;
        }

        @keyframes pulse-conflict {
            0% { box-shadow: inset 0 0 15px rgba(245, 158, 11, 0.3); }
            50% { box-shadow: inset 0 0 25px rgba(245, 158, 11, 0.6); }
            100% { box-shadow: inset 0 0 15px rgba(245, 158, 11, 0.3); }
        }
        .tooltip {
            display: none; position: absolute; left: 50%; top: 100%; transform: translateX(-50%);
            background: #1e293b; border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
            padding: 0.5rem 0.75rem; font-size: 0.75rem; color: #e2e8f0; z-index: 20;
            white-space: nowrap; max-width: 260px; white-space: normal; min-width: 160px;
            pointer-events: none;
        }
        .cell-unavail:hover .tooltip { display: block; }
        .legend { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; margin-top: 0.5rem; }
        .legend-item { display: flex; gap: 0.4rem; align-items: center; font-size: 0.8rem; color: #94a3b8; }
        .legend-dot { width: 14px; height: 14px; border-radius: 3px; }
    </style>
</head>
<body style="background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; overflow-y:auto;">
    <div class="background-elements">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="visor-container">
        <div class="glass-panel" style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem;">
            <div>
                <h1 id="student-name" style="font-size:1.8rem; margin:0;">Cargando...</h1>
                <p id="student-role" style="margin:0.25rem 0 0; color:#94a3b8; font-size:0.9rem;"></p>
            </div>
            <button class="btn-secondary" onclick="window.close()">✕ Cerrar</button>
        </div>

        <div class="glass-panel">
            <p style="color:#94a3b8; font-size:0.875rem; margin-bottom:1rem;">
                🔍 Los bloques resaltados en <strong style="color:#fbbf24;">ámbar</strong> son donde el horario propuesto choca con tu disponibilidad. Los bloques <strong style="color:#60a5fa;">azules</strong> son parte de la propuesta donde sí estás disponible.
            </p>
            <div class="legend">
                <div class="legend-item"><div class="legend-dot" style="background:rgba(16,185,129,0.35);"></div> Disponible</div>
                <div class="legend-item"><div class="legend-dot" style="background:rgba(239,68,68,0.45);"></div> No disponible</div>
                <div class="legend-item"><div class="legend-dot cell-proposal" style="width:14px; height:14px;"></div> Bloque propuesto (Libre)</div>
                <div class="legend-item"><div class="legend-dot cell-proposal-conflict" style="width:14px; height:14px;"></div> Bloque propuesto (CHOQUE ⚠️)</div>
            </div>
        </div>

        <div class="glass-panel" style="overflow-x:auto; padding: 1.5rem 1rem;">
            <table class="schedule-table">
                <thead>
                    <tr>
                        <th style="width:90px;">Hora</th>
                        <th>Lunes</th><th>Martes</th><th>Miércoles</th><th>Jueves</th><th>Viernes</th>
                    </tr>
                </thead>
                <tbody id="visor-tbody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const timeSlots = [
            '08:00 - 09:00','09:00 - 10:00','10:00 - 11:00','11:00 - 12:00',
            '12:00 - 13:00','13:00 - 14:00','14:00 - 15:00','15:00 - 16:00',
            '16:00 - 17:00','17:00 - 18:00','18:00 - 19:00','19:00 - 20:00',
            '20:00 - 21:00','21:00 - 22:00'
        ];

        const params = new URLSearchParams(window.location.search);
        const studentName = decodeURIComponent(params.get('name') || '');
        const proposalJson = params.get('proposal') || '';
        
        // Parse proposal blocks into a Set for quick lookup
        const proposalCells = new Set();
        if (proposalJson) {
            try {
                const blocks = JSON.parse(decodeURIComponent(proposalJson));
                blocks.forEach(b => {
                    for (let i = 0; i < b.duration; i++) {
                        proposalCells.add(`${b.startRow + i}_${b.col}`);
                    }
                });
            } catch(e) { console.error("Error parsing proposal:", e); }
        }

        const tbody = document.getElementById('visor-tbody');
        const titleEl = document.getElementById('student-name');
        const roleEl = document.getElementById('student-role');

        async function loadData() {
            try {
                const res = await fetch('api.php', {
                    method: 'POST',
                    body: JSON.stringify({ action: 'get_all_schedules' })
                });
                const result = await res.json();
                if (!result.success || !result.data) {
                    titleEl.textContent = 'Error al cargar datos.';
                    return;
                }

                const person = result.data.find(p => p.name === studentName);
                if (!person) {
                    titleEl.textContent = `"${studentName}" no encontrado.`;
                    roleEl.textContent = 'No hay datos registrados para esta persona.';
                    return;
                }

                titleEl.textContent = person.name;
                const roleLabel = person.role === 'profesor' ? '👨‍🏫 Profesor' : '🎓 Estudiante';
                roleEl.textContent = `${roleLabel} · ${person.email || ''}`;

                const numRows = person.grid.length;
                for (let r = 0; r < numRows; r++) {
                    const tr = document.createElement('tr');
                    // Highlight 20:00 row
                    if (r === 12) tr.classList.add('highlight-hour');

                    const th = document.createElement('th');
                    th.textContent = timeSlots[r] || `Fila ${r}`;
                    tr.appendChild(th);

                    for (let c = 0; c < 5; c++) {
                        const cellData = person.grid[r][c];
                        const td = document.createElement('td');
                        const isProposed = proposalCells.has(`${r}_${c}`);

                        if (cellData.state === 'unavailable') {
                            if (isProposed) {
                                td.classList.add('cell-proposal-conflict');
                            } else {
                                td.classList.add('cell-unavail');
                            }
                            td.innerHTML = `<div class="tooltip">${cellData.comment || 'Sin motivo especificado'}</div>`;
                        } else {
                            if (isProposed) {
                                td.classList.add('cell-proposal');
                            } else if (cellData.state === 'available') {
                                td.classList.add('cell-avail');
                            }
                        }
                        tr.appendChild(td);
                    }
                    tbody.appendChild(tr);
                }
            } catch(e) {
                titleEl.textContent = 'Error de conexión.';
                console.error(e);
            }
        }

        loadData();
    </script>
</body>
</html>
